<!DOCTYPE html>
<html>
<head>
<title>RouteSathi - Travel Planner</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.container{
width:500px;
margin:auto;
background:white;
padding:30px;
margin-top:50px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:12px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
display:none;
}
</style>
</head>

<body>

<h1>🚗 RouteSathi</h1>
<p>Smart Travel Planner for Highway Trips</p>

<div class="container">

<input id="start" placeholder="Start City">

<input id="end" placeholder="End City">

<input id="halt" placeholder="Halt (Optional)">

<br>

<button onclick="planTrip()">Plan Journey</button>

<div id="result" class="result">

<h3>Journey Information</h3>

<p>✔ Best Hotels on Route</p>

<p>✔ Fuel / CNG / EV Charging Stations</p>

<p>✔ Toll Information</p>

<p>✔ Highway Emergency Contacts</p>

<p>✔ Best Route with Minimum Tolls</p>

<p>✔ Tourist Places Between Route</p>

</div>

</div>

<script>

function planTrip(){

let start=document.getElementById("start").value
let end=document.getElementById("end").value

if(start==""||end==""){
alert("Please enter start and end city")
return
}

document.getElementById("result").style.display="block"

}

</script>

</body>
</html>
